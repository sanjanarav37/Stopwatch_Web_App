<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stopwatch</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div id="box">
    <div class="container"> 
        <div class="watch">
            <div class="ocir">
                 <div class="icir">
                    <span class="minute">00</span>
                    <span class="colon">:</span>
<span class="sec">00</span>
   <span class="colon">:</span>
<span class="msec">00</span>
                 </div>
            </div>
        </div>

        <div class="butwrap">
<button class="but reset hidden">Reset</button>
<button  class="but play">Play</button>
<button  class="but lap hidden">Lap</button>

        </div>
        <ul class="laps">
            <button id="clr" class="clear hidden">Clear All</button>

        </ul>
</div>
<script src="script.js"></script>

</body>
</html>
